<text class="label" x="28" y="262">Conv1+BN / direct</text>
<rect class="bar-direct" x="245" y="244" width="535.8" height="22" rx="3"/>
<text class="value" x="790.8" y="260">191.407 ms</text>
<text class="label" x="28" y="302">Conv1+BN / im2col+Eigen</text>
<rect class="bar-eigen" x="245" y="284" width="362.1" height="22" rx="3"/>
