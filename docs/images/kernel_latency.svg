<rect class="bar-direct" x="245" y="164" width="535.7" height="22" rx="3"/>
<text class="value" x="790.7" y="180">190.968 ms</text>
<text class="label" x="28" y="222">Conv1 / im2col+Eigen</text>
<rect class="bar-eigen" x="245" y="204" width="360.4" height="22" rx="3"/>
