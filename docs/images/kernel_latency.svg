<svg xmlns="http://www.w3.org/2000/svg" width="980" height="372" viewBox="0 0 980 372" role="img"><style>text{font-family:Inter,Arial,sans-serif;fill:#1f2937}.title{font-size:18px;font-weight:700}.subtitle{font-size:12px;fill:#4b5563}.label{font-size:12px}.value{font-size:12px;font-weight:600}.axis{stroke:#d1d5db;stroke-width:1}.bar-direct{fill:#64748b}.bar-eigen{fill:#2563eb}.bar-speed{fill:#059669}</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<text class="title" x="28" y="34">Kernel latency</text>
<text class="subtitle" x="28" y="56">Median latency in milliseconds. Bar length uses a log scale.</text>
<line class="axis" x1="245" y1="72" x2="790" y2="72"/>
<text class="label" x="28" y="102">Linear / direct</text>
